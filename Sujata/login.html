<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login</title>

<style>

body{
font-family: Arial;
margin:0;
height:100vh;
display:flex;
}

.left{
width:50%;
background:url("img1.avif") no-repeat center;
background-size:cover;
}

.right{
width:50%;
display:flex;
justify-content:center;
align-items:center;
background:#f3f0ff;
}

.login-box{
background:white;
padding:40px;
width:320px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
border-top:5px solid #7b3fe4;
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#7b3fe4;
}

.input-box{
margin-bottom:15px;
}

.input-box label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.input-box input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#7b3fe4;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5e2ec4;
}

.register{
text-align:center;
margin-top:15px;
}

</style>
</head>

<body>

<div class="left"></div>

<div class="right">

<div class="login-box">

<h2>User Login</h2>

<form action="profile.html">

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter Email">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter Password">
</div>

<button>Login</button>

</form>

<p class="register">
Don't have account? <a href="register.html">Register</a>
</p>

</div>

</div>

</body>
</html>
